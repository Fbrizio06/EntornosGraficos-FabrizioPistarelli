<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Contacto</title>
</head>
<body>



<h1>Contacto</h1>
<p>Complet&aacute; el siguiente formulario para enviar una consulta al webmaster.</p>

<form action="procesar_contacto.php" method="post">

  <p>
    <label for="nombre">Nombre:</label><br />
    <input type="text" id="nombre" name="nombre" required="required" />
  </p>

  <p>
    <label for="email">Email:</label><br />
    <input type="email" id="email" name="email" required="required" />
  </p>

  <p>
    <label for="asunto">Asunto:</label><br />
    <input type="text" id="asunto" name="asunto" required="required" />
  </p>

  <p>
    <label for="mensaje">Mensaje:</label><br />
    <textarea id="mensaje" name="mensaje" rows="6" cols="40" required="required"></textarea>
  </p>

  <p>
    <input type="submit" value="Enviar consulta" />
    <input type="reset" value="Borrar" />
  </p>

</form>

</body>
</html>
