<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Práctica 2 - Ejercicio 2</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    .sidebar {
      background-color: #6c757d;
      color: #fff;
      min-height: 400px;
      padding: 15px;
    }
    .rectangulo {
      background-color: #8e6fc7;
      color: #fff;
      min-height: 110px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .rectangulo-grande {
      background-color: #3fc1d6;
      color: #fff;
      min-height: 245px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar: tamaño 3 -->
    <div class="col-12 col-sm-12 col-md-3">
      <div class="sidebar">
        <h2>Sidebar</h2>
      </div>
    </div>

    <!-- Contenido: 6 rectángulos (3 por fila, tamaño 3) + 1 grande (tamaño 6) -->
    <div class="col-12 col-sm-12 col-md-9">
      <div class="row">
        <div class="col-12 col-sm-12 col-md-3"><div class="rectangulo">1</div></div>
        <div class="col-12 col-sm-12 col-md-3"><div class="rectangulo">2</div></div>
        <div class="col-12 col-sm-12 col-md-3"><div class="rectangulo">3</div></div>
        <div class="col-12 col-sm-12 col-md-3"><div class="rectangulo">4</div></div>
      </div>
      <div class="row">
        <div class="col-12 col-sm-12 col-md-3"><div class="rectangulo">5</div></div>
        <div class="col-12 col-sm-12 col-md-3"><div class="rectangulo">6</div></div>
        <div class="col-12 col-sm-12 col-md-6">
          <div class="rectangulo-grande">Rectángulo grande</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
