<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Práctica 3 - Componentes</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    .sidebar {
      background-color: #6c757d;
      color: #fff;
      min-height: 400px;
      padding: 15px;
    }
    .rectangulo-grande {
      background-color: #3fc1d6;
      min-height: 320px;
      padding: 15px;
    }
    .carousel-item img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }
  </style>
</head>
<body>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar con botón que abre el modal -->
    <div class="col-12 col-sm-12 col-md-3">
      <div class="sidebar">
        <h2>Sidebar</h2>
        <button type="button" class="btn btn-light" data-bs-toggle="modal" data-bs-target="#modalEjemplo">
          Abrir modal
        </button>
      </div>
    </div>

    <div class="col-12 col-sm-12 col-md-9">

      <!-- 4 cards en lugar de los rectángulos violetas -->
      <div class="row">
        <div class="col-12 col-sm-6 col-md-3 mb-3">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Card 1</h5>
              <p class="card-text">Texto de ejemplo para la card 1.</p>
            </div>
          </div>
        </div>
        <div class="col-12 col-sm-6 col-md-3 mb-3">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Card 2</h5>
              <p class="card-text">Texto de ejemplo para la card 2.</p>
            </div>
          </div>
        </div>
        <div class="col-12 col-sm-6 col-md-3 mb-3">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Card 3</h5>
              <p class="card-text">Texto de ejemplo para la card 3.</p>
            </div>
          </div>
        </div>
        <div class="col-12 col-sm-6 col-md-3 mb-3">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Card 4</h5>
              <p class="card-text">Texto de ejemplo para la card 4.</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Rectángulo grande: alert + slider -->
      <div class="row">
        <div class="col-12">
          <div class="rectangulo-grande">

            <div class="alert alert-success" role="alert">
              ¡Operación realizada con éxito!
            </div>

            <div id="carouselEjemplo" class="carousel slide" data-bs-ride="carousel">
              <div class="carousel-inner">
                <div class="carousel-item active">
                  <img src="https://picsum.photos/id/10/800/250" class="d-block w-100" alt="Imagen 1" />
                </div>
                <div class="carousel-item">
                  <img src="https://picsum.photos/id/20/800/250" class="d-block w-100" alt="Imagen 2" />
                </div>
                <div class="carousel-item">
                  <img src="https://picsum.photos/id/30/800/250" class="d-block w-100" alt="Imagen 3" />
                </div>
              </div>
              <button class="carousel-control-prev" type="button" data-bs-target="#carouselEjemplo" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
              </button>
              <button class="carousel-control-next" type="button" data-bs-target="#carouselEjemplo" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
              </button>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="modalEjemplo" tabindex="-1" aria-labelledby="modalEjemploLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalEjemploLabel">Título del modal</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        Contenido de ejemplo dentro del modal.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        <button type="button" class="btn btn-primary">Guardar cambios</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
